name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências de build
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Mover artefato
        run: mv ../elden-ring-tracker_*.deb .

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: '*.AppImage'

  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean build-flatpak packaging/flatpak/com.github.andrefarias.EldenRingTracker.yml
          flatpak-builder --repo=flatpak-repo build-flatpak packaging/flatpak/com.github.andrefarias.EldenRingTracker.yml
          flatpak build-bundle flatpak-repo elden-ring-tracker.flatpak com.github.andrefarias.EldenRingTracker

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: '*.flatpak'

  release:
    needs: [build-deb, build-appimage, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.AppImage
            *.flatpak
          generate_release_notes: true
