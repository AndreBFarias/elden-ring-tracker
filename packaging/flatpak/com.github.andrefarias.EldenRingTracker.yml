app-id: com.github.andrefarias.EldenRingTracker
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: /app/opt/GraceMap/run.sh

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --filesystem=home:ro
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: python3-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app -r requirements.txt
    sources:
      - type: file
        path: ../../requirements.txt

  - name: GraceMap
    buildsystem: simple
    build-commands:
      - install -d /app/opt/GraceMap
      - cp -r src /app/opt/GraceMap/
      - cp -r data /app/opt/GraceMap/
      - cp -r assets /app/opt/GraceMap/
      - cp -r scripts /app/opt/GraceMap/
      - cp requirements.txt /app/opt/GraceMap/
      - cp pyproject.toml /app/opt/GraceMap/
      - cp run.sh /app/opt/GraceMap/
      - cp setup.sh /app/opt/GraceMap/
      - cp Makefile /app/opt/GraceMap/
      - install -Dm644 assets/icons/icon.png /app/share/icons/hicolor/256x256/apps/com.github.andrefarias.EldenRingTracker.png
      - install -Dm644 packaging/flatpak/com.github.andrefarias.EldenRingTracker.desktop /app/share/applications/com.github.andrefarias.EldenRingTracker.desktop
    sources:
      - type: dir
        path: ../..
